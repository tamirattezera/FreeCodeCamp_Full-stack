<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <header>
      <h1 id="title">Tech Insight Survey</h1>
      <p id="description">
        Your insights directly influence the products and systems we design.
        This short survey takes less than three minutes to complete.
      </p>
    </header>
    <main>
      <form id="survey-form">
        <label for="name" id="name-label">Full Name (required)</label>
        <input
          id="name"
          type="text"
          name="name"
          placeholder="Enter your full name"
          required
        /><br /><br />
        <label for="email" id="email-label">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          placeholder="you@example.com"
          aria-describedby="email-note"
        />
        <small id="email-note">We will only contact you if necessary. </small
        ><br />
        <label id="number-label" for="number">Years of Experience (1-50)</label>
        <input
          id="number"
          type="number"
          name="experience"
          min="1"
          max="50"
          placeholder="Enter a number"
        /><br /><br />
        <label for="dropdown">Primary Role</label>
        <select id="dropdown" name="role">
          <option value="">Select One</option>
          <option value="frontend">Frontend Developer</option>
          <option value="backend">Backend Developer</option></select
        ><br /><br />
        <p>Would you recommend our platform</p>
        <label
          ><input type="radio" name="reccomend" value="yes" required />Yes
        </label>
        <label><input type="radio" name="reccomend" value="no" />No </label>
        <p>Which technology do you use?</p>
        <label><input type="checkbox" value="html" />HTML</label>
        <label><input type="checkbox" value="css" />CSS</label>
        <input type="checkbox" value="javascript" />JavaScript <br /><br />
        <label for="comments">Additional Comments</label>
        <textarea id="comments" name="comments" rows="4" cols="40"></textarea
        ><br /><br />
        <button type="submit" id="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
